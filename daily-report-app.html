const $ = (s, p) => (p || document).querySelector(s);
const $$ = (s, p) => Array.from((p || document).querySelectorAll(s));
const E = (tag, attrs = {}, children = []) => {
  const el = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs))
    if (k === "className") el.className = v;
    else if (k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(), v);
    else el.setAttribute(k, v);

};

const IDB_DB = 'dailyReportDB_v3';
const IDB_STORE = 'fileHandle';

function openIDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_DB, 1);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(IDB_STORE)) db.createObjectStore(IDB_STORE);
    };
    req.onsuccess = (e) => resolve(e.target.result);
    req.onerror = () => reject(req.error);
  });
}

async function storeFileHandle(handle) {
  if (!hasFileAPI) return;
  try {
    const db = await openIDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, 'readwrite');
      tx.objectStore(IDB_STORE).put(handle, 'current');
      tx.oncomplete = () => { db.close(); resolve(); };
      tx.onerror = () => { db.close(); reject(tx.error); };
    });
  } catch (e) {}
}

async function recallFileHandle() {
  if (!hasFileAPI) return null;
  try {
    const db = await openIDB();
    return new Promise((resolve) => {
      const tx = db.transaction(IDB_STORE, 'readonly');
      const req = tx.objectStore(IDB_STORE).get('current');
      req.onsuccess = () => { db.close(); resolve(req.result || null); };
      req.onerror = () => { db.close(); resolve(null); };
    });
  } catch (e) { return null; }
}

async function verifyHandlePermission(handle) {
  if (!handle) return false;
  const opts = { mode: 'readwrite' };
  const state = await handle.queryPermission(opts);
  if (state === 'granted') return true;
  if (state === 'prompt') {
    const result = await handle.requestPermission(opts);
    return result === 'granted';
  }
  return false;
}

  if (!hasFileAPI) {
    showToast('褰撳墠娴忚鍣ㄤ笉鏀寔锛岃浣跨敤Chrome/Edge鎵撳紑', 'error');
    return;

async function writeToFileNow(handle) {
  if (!handle) return false;
  try {
    const data = collectAllData();
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    // Use createWritable for overwrite
    const writable = await handle.createWritable();
    await writable.write(blob);
    await writable.close();
    lastSaveTime = new Date();
    scheduleSaveFlash();
    updateStatusBar();
    return true;
  } catch (e) {
    console.warn('writeToFile:', e);
    return false;
  }
}

// Debounced file write (avoids hammering disk on every keystroke)
let fileWriteTimer = null;
function scheduleFileWrite() {
  clearTimeout(fileWriteTimer);
  fileWriteTimer = setTimeout(async () => {
    if (fileHandle) {
      const ok = await writeToFileNow(fileHandle);
      if (!ok) {
        const permOk = await verifyHandlePermission(fileHandle);
        if (permOk) {
          await writeToFileNow(fileHandle);
        } else {
          fileHandle = null;
          showToast('鈿?鏂囦欢杩炴帴宸叉柇寮€锛屾暟鎹凡瀛樺埌娴忚鍣ㄦ殏瀛?, 'error');
          updateStatusBar();
        }
      }
    }
  }, 1200);
}

async function readFromFile(handle) {
  if (!handle) return null;
  try {
    const f = await handle.getFile();
    const text = await f.text();
    return JSON.parse(text);
  } catch (e) { return null; }
}

// 鈹€鈹€ Paste parser 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
function parsePasteText(raw, personIdx) {
  const text = raw.trim();
  if (!text) return {};

  const result = {};
  const lines = text.split(/[\n\r]+/).map(l => l.trim()).filter(Boolean);

  // Category buckets
  let workLines = [];
  let planLines = [];
  let premiumLines = [];
  let restLines = [];

  // Keywords for routing
  const workKeywords = ['浠婃棩宸ヤ綔', '宸ヤ綔鍐呭', '宸ヤ綔', '浠婂ぉ', '浠婃棩'];
  const planKeywords = ['鏄庢棩宸ヤ綔璁″垝', '鏄庢棩璁″垝', '鏄庢棩', '鏄庡ぉ璁″垝', '鏄庢棩宸ヤ綔', '鏄庡ぉ'];
  const premiumKeywords = ['淇濊垂棰勪及', '淇濊垂', '鏄庢棩淇濊垂', '棰勪及淇濊垂', '棰勪及'];

  let currentSection = 'work'; // default bucket

  for (const line of lines) {
    // Detect section changes
    const lc = line.toLowerCase().replace(/\s+/g, '');
    if (workKeywords.some(k => lc.includes(k))) { currentSection = 'work'; continue; }
    if (planKeywords.some(k => lc.includes(k))) { currentSection = 'plan'; continue; }
    if (premiumKeywords.some(k => lc.includes(k))) { currentSection = 'premium'; continue; }

    // Try key-value extraction
    const kv = extractKV(line);
    if (kv) {
      // Map to field
      const field = mapToField(kv.key);
      if (field) {
        result[field] = kv.value;
        continue;
      }
    }

    // Route remaining lines
    if (currentSection === 'work') workLines.push(line);
    else if (currentSection === 'plan') planLines.push(line);
    else if (currentSection === 'premium') premiumLines.push(line);
    else restLines.push(line);
  }

  // Assign accumulated lines
  if (workLines.length && !result.work) result.work = workLines.join('\n');
  if (planLines.length && !result.plan) result.plan = planLines.join('\n');
  if (premiumLines.length && !result.premium) result.premium = premiumLines.join('\n');

  // Second pass: try to extract numbers from unstructured lines
  if (restLines.length) {
    const extra = extractNumbersFromText(restLines.join('锛?));
    for (const [k, v] of Object.entries(extra)) {
      if (result[k] === undefined || result[k] === '') result[k] = v;
    }
  }

  return result;
}

function extractKV(line) {
  // Match: "鍏抽敭璇? followed by optional colon "锛?銆?:"銆?鏄? and then the value
  const patterns = [
    /^(.+?)[锛?]\s*(.+)$/,
    /^(.+?)\s*[鏄负]\s*(.+)$/,
  ];
  for (const re of patterns) {
    const m = line.match(re);
    if (m) return { key: m[1].trim(), value: m[2].trim() };
  }
  return null;
}

function mapToField(key) {
  const k = key.replace(/\s+/g, '').toLowerCase();
  const map = {
    '娓犻亾缁忚惀': 'channelWork', '娓犻亾': 'channelWork',
    '娲诲姩璧嬭兘': 'activity', '娲诲姩': 'activity',
    '鍩硅杈呭': 'training', '鍩硅': 'training',
    '鏈夋晥闈㈣皥浜烘暟': 'fansInterview', '鏈夋晥闈㈣皥': 'fansInterview', '闈㈣皥浜烘暟': 'fansInterview', '闈㈣皥': 'fansInterview',
    '璁″垝涔﹂€掗€佷唤鏁?: 'fansPlan', '璁″垝涔?: 'fansPlan', '璁″垝涔︿唤鏁?: 'fansPlan',
    '鏂板绮変笣浜烘暟': 'fansNew', '鏂板绮変笣': 'fansNew', '绮変笣浜烘暟': 'fansNew',
    '鏂板娲荤矇浜烘暟': 'fansActive', '鏂板娲荤矇': 'fansActive', '娲荤矇浜烘暟': 'fansActive',
    '鏂板楂榩绮変汉鏁?: 'fansHighP', '鏂板楂榩绮?: 'fansHighP', '楂榩绮変汉鏁?: 'fansHighP', '楂榩绮?: 'fansHighP',
    '绾夸笂鍝佸': 'specialOnline', '鍝佸绡囨暟': 'specialOnline', '绾夸笂鍝佸绡囨暟': 'specialOnline', '鍝佸': 'specialOnline',
    '绾夸笅鍩硅': 'specialTrain', '鍩硅鍦烘暟': 'specialTrain',
    '绾夸笅娲诲姩': 'specialAct', '娲诲姩鍦烘暟': 'specialAct',
    '琛ㄧ幇浜偣': 'excellent', '浜偣': 'excellent',
    '闇€鏀硅繘': 'improve', '鏀硅繘': 'improve', '鏀硅繘浜嬮」': 'improve',
  };
  return map[k] || null;
}

function extractNumbersFromText(text) {
  const result = {};
  // Extract numbers with context
  const patterns = [
    { re: /鏈夋晥闈㈣皥[^0-9]*(\d+)\s*浜?i, field: 'fansInterview' },
    { re: /闈㈣皥[^0-9]*(\d+)\s*浜?i, field: 'fansInterview' },
    { re: /璁″垝涔^0-9]*(\d+)\s*[浠戒汉]/i, field: 'fansPlan' },
    { re: /鏂板绮変笣[^0-9]*(\d+)\s*浜?i, field: 'fansNew' },
    { re: /鏂板娲荤矇[^0-9]*(\d+)\s*浜?i, field: 'fansActive' },
    { re: /楂楶绮塠^0-9]*(\d+)\s*浜?i, field: 'fansHighP' },
    { re: /绾夸笂鍝佸[^0-9]*(\d+)\s*绡?i, field: 'specialOnline' },
    { re: /绾夸笅鍩硅[^0-9]*(\d+)\s*鍦?i, field: 'specialTrain' },
    { re: /绾夸笅娲诲姩[^0-9]*(\d+)\s*鍦?i, field: 'specialAct' },
    { re: /鍝佸[^0-9]*(\d+)\s*绡?i, field: 'specialOnline' },
    { re: /鍩硅[^0-9]*(\d+)\s*鍦?i, field: 'specialTrain' },
    { re: /娲诲姩[^0-9]*(\d+)\s*鍦?i, field: 'specialAct' },
  ];
  for (const { re, field } of patterns) {
    const m = text.match(re);
    if (m) result[field] = m[1];
  }
  return result;
}

// 鈹€鈹€ merge 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
function merge(people) {
  const m = {
    work: [], plan: [], premium: [],
    excellent: [], improve: [],
    fans: { interview:0, plan:0, newFans:0, activeFans:0, highP:0 },
    special: { onlineToday:0, trainToday:0, actToday:0 },
    channelWork: [], activity: [], training: [],
  };
  for (const p of people) {
    for (const item of p.work) m.work.push(item);
    for (const item of p.plan) m.plan.push(item);
    for (const item of p.premium) m.premium.push(item);
    if (p.excellent) m.excellent.push({ name: p.name, text: p.excellent });
    if (p.improve) m.improve.push({ name: p.name, text: p.improve });
    m.fans.interview += p.fansInterview;
    m.fans.plan += p.fansPlan;
    m.fans.newFans += p.fansNew;
    m.fans.activeFans += p.fansActive;
    m.fans.highP += p.fansHighP;
    m.special.onlineToday += p.specialOnline;
    m.special.trainToday += p.specialTrain;
    m.special.actToday += p.specialAct;
    if (p.channelWork) m.channelWork.push(p.channelWork);
    if (p.activity) m.activity.push(p.activity);
    if (p.training) m.training.push(p.training);
  }
  return m;
}

  try {

    b.textContent = "鉁?宸插鍒?;

  const summaryIds = ['reportDate','monthLabel','todayPresale','todayUnderwrite','monthPresale','monthUnderwrite','monthTarget','tomorrowEstimate','activityPeople','channelCount','specialTarget','specialMonth','specialToday','onlineMonth','offlineTrainingMonth','offlineActivityMonth','monthActiveFans','monthHighPFans'];
  summaryIds.forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
  for (let i = 0; i < 4; i++) {
    const card = $$(".person-card")[i];
    if (!card) continue;
    card.querySelector(".name-input").value = DEFAULT_NAMES[i];
    personData[i].name = DEFAULT_NAMES[i];
    for (const f of PERSON_FIELDS) {
      const el = card.querySelector(`#p${i}_${f.id}`);
      if (el) { el.value = ""; personData[i][f.id] = ""; }
    }
  }
  $("#result").value = "";
  localStorage.removeItem(STORAGE_KEY);
  if (fileHandle) writeToFileNow(fileHandle);
  showToast('宸叉竻绌烘墍鏈夋暟鎹?, 'success');
}

// 鈹€鈹€ utilities 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
function n(v) { return Number(v || 0); }
function lines(v) { return String(v||"").split("\n").map(s=>s.trim()).filter(Boolean); }
function fmt(v) { const x = n(v); return Number.isInteger(x) ? String(x) : String(x); }
function onlyUnique(v, i, a) { return a.indexOf(v) === i; }
function splitPair(v) { const nums = String(v).match(/\d+(?:\.\d+)?/g) || []; return [n(nums[0]), n(nums[1])]; }
function numberLines(items) { return items.length ? items.map((item, i) => `${i+1}銆?{item}`) : ["鏃?]; }
function makeItem(items, keywords) { const matched = items.filter(it => keywords.some(k => it.includes(k))); return matched.length ? matched.join("銆?) : "鏃?; }
function unique(items) { return [...new Set(items.map(it => it.trim()).filter(Boolean))]; }

// 鈹€鈹€ collapse all 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
function collapseAll() {
  $$(".person-card").forEach(card => {
    const body = card.querySelector(".person-body");
    const btn = card.querySelector(".toggle-btn");
    if (body.style.display !== "none") { body.style.display = "none"; btn.textContent = "灞曞紑"; }
  });
}

// 鈹€鈹€ init 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
async function init() {
  buildCards();
  checkFileAPI();

  // 1. Try file handle from IndexedDB
  if (hasFileAPI) {
    const handle = await recallFileHandle();
    if (handle) {
      const permOk = await verifyHandlePermission(handle);
      if (permOk) {
        const fileData = await readFromFile(handle);
        if (fileData) {
          fileHandle = handle;
          applyDataToForm(fileData);
          saveToLocalStorage(); // mirror
        }
      }
    }
  }

  // 2. Fallback: localStorage
  if (!fileHandle && !localStorage.getItem(STORAGE_KEY)) {
    // First visit: load defaults
    $('#reportDate').value = '6.11';
    $('#monthLabel').value = '6鏈?;
  }
  const loaded = loadFromLocalStorage();

  // 3. Sync DOM
  syncToDOM();

  updateStatusBar();
  attachSummaryAutoSave();
  startFlashInterval();

  // Buttons
  $("#generateBtn").addEventListener("click", generate);
  $("#copyBtn").addEventListener("click", copyResult);
  $("#downloadBtn").addEventListener("click", downloadResult);
  $("#sampleBtn").addEventListener("click", fillSample);
  $("#clearBtn").addEventListener("click", clearAll);
  $("#collapseAll").addEventListener("click", collapseAll);
  $("#pickFileBtn").addEventListener("click", pickSaveFile);
  $("#exportBtn").addEventListener("click", exportJSON);
  $("#importBtn").addEventListener("click", importJSON);
  $("#importFile").addEventListener("change", handleImportFile);

  // beforeunload: final save
  window.addEventListener('beforeunload', () => {
    saveToLocalStorage();
  });

  // Periodic safety save (every 15 seconds)
  setInterval(() => {
    if (localStorage.getItem(STORAGE_KEY)) saveToLocalStorage();
  }, 15000);
}

document.addEventListener("DOMContentLoaded", init);
</script>
