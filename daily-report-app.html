<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>每日汇报填写汇总工具</title>
  <style>
:root {
  --bg: #f4f5f8;
  --panel: #ffffff;
  --text: #1e293b;
  --muted: #64748b;
  --line: #d8dee8;
  --brand: #0b7f74;
  --brand-hover: #09685e;
  --soft: #ecf7f5;
  --radius: 8px;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
  font-size: 14px;
}

input, textarea, button { font: inherit; }

.shell {
  width: min(1500px, calc(100vw - 32px));
  margin: 0 auto;
  padding: 20px 0 32px;
}

/* top bar */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 20px;
  margin-bottom: 14px;
}

h1 { font-size: 22px; margin: 0; }
h2 { font-size: 15px; margin: 0; }
.topbar p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }

.actions { display: flex; gap: 8px; flex-wrap: wrap; }

button {
  height: 36px;
  border: 1px solid var(--brand);
  border-radius: 6px;
  padding: 0 16px;
  background: var(--brand);
  color: #fff;
  cursor: pointer;
  white-space: nowrap;
  font-size: 13px;
  font-weight: 500;
}
button:hover { background: var(--brand-hover); }
button.secondary {
  background: #fff;
  color: var(--brand);
}
button.secondary:hover { background: var(--soft); }
button.small { height: 30px; font-size: 12px; padding: 0 12px; }

/* summary */
.summary-box {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--panel);
  margin-bottom: 14px;
}
.summary-box summary {
  padding: 10px 14px;
  cursor: pointer;
  font-weight: 600;
  font-size: 14px;
}
.summary-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 10px;
  padding: 0 14px 14px;
}
.summary-grid label {
  display: flex;
  flex-direction: column;
  gap: 4px;
  font-size: 12px;
  color: #475569;
  font-weight: 600;
}
.summary-grid input {
  height: 32px;
  border: 1px solid var(--line);
  border-radius: 5px;
  padding: 0 8px;
  font-size: 13px;
}
.summary-grid input:focus {
  border-color: var(--brand);
  box-shadow: 0 0 0 3px rgba(11, 127, 116, 0.10);
  outline: none;
}

/* person section */
.person-section {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--panel);
  margin-bottom: 14px;
}
.person-section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 14px;
  border-bottom: 1px solid var(--line);
  background: #fbfcfd;
}

.person-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  padding: 14px;
}

/* person card */
.person-card {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: #fff;
  overflow: hidden;
}
.person-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 8px 12px;
  border-bottom: 1px solid #eceef2;
  background: #fafbfc;
}
.person-card-header .name-input {
  border: 0;
  font-weight: 700;
  font-size: 15px;
  width: 120px;
  padding: 4px 0;
  background: transparent;
}
.person-card-header .name-input:focus { outline: none; }
.person-card-header .toggle-btn {
  border: 0;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-size: 13px;
  padding: 2px 8px;
  height: auto;
}
.person-card-header .toggle-btn:hover { color: var(--text); }

.person-body {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  padding: 10px 12px;
}
.person-body label {
  display: flex;
  flex-direction: column;
  gap: 3px;
  font-size: 12px;
  color: #475569;
  font-weight: 500;
}
.person-body label.full-span {
  grid-column: 1 / -1;
}
.person-body input,
.person-body textarea {
  border: 1px solid #dde3ec;
  border-radius: 5px;
  background: #fff;
  outline: none;
}
.person-body input:focus,
.person-body textarea:focus {
  border-color: var(--brand);
  box-shadow: 0 0 0 3px rgba(11, 127, 116, 0.08);
}
.person-body input[type="text"],
.person-body input[type="number"] {
  height: 30px;
  padding: 0 8px;
  font-size: 13px;
}
.person-body textarea {
  padding: 7px 8px;
  font-size: 13px;
  line-height: 1.45;
  resize: vertical;
  min-height: 54px;
}

/* result */
.result-section {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--panel);
}
.result-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 14px;
  border-bottom: 1px solid var(--line);
  background: #fbfcfd;
}
#result {
  display: block;
  width: 100%;
  min-height: 520px;
  border: 0;
  padding: 16px;
  font-size: 13px;
  line-height: 1.55;
  white-space: pre-wrap;
  resize: vertical;
  outline: none;
}

@media (max-width: 980px) {
  .person-grid { grid-template-columns: 1fr; }
  .summary-grid { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 600px) {
  .summary-grid { grid-template-columns: 1fr; }
  .person-body { grid-template-columns: 1fr; }
}

</style>
</head>
<body>
<main class="shell">

  <header class="topbar">
    <div>
      <h1>每日汇报填写汇总</h1>
      <p>四位伙伴分别填写，一键生成三个汇报板块　<span id="saveIndicator" style="color:#0b7f74;font-size:12px;font-weight:normal;display:none;">✓ 已自动保存</span></p>
    </div>
    <div class="actions">
      <button id="sampleBtn" type="button" class="secondary">填入示例</button>
      <button id="clearBtn" type="button" class="secondary">清空</button>
      <button id="generateBtn" type="button">生成汇报</button>
    </div>
  </header>

  <details class="summary-box" open>
    <summary>团队汇总数据</summary>
    <div class="summary-grid">
      <label>汇报日期<input id="reportDate" type="text" value="6.11" /></label>
      <label>本月名称<input id="monthLabel" type="text" value="6月" /></label>
      <label>今日预收万P<input id="todayPresale" type="number" step="0.1" value="7.2" /></label>
      <label>今日承保万P<input id="todayUnderwrite" type="number" step="0.1" value="19.2" /></label>
      <label>本月累计预收万P<input id="monthPresale" type="number" step="0.1" value="144.9" /></label>
      <label>本月累计承保万P<input id="monthUnderwrite" type="number" step="0.1" value="296.8" /></label>
      <label>月目标万P<input id="monthTarget" type="number" step="0.1" value="225" /></label>
      <label>明日预估万P<input id="tomorrowEstimate" type="number" step="0.1" value="6" /></label>
      <label>活动人力 目标/达成<input id="activityPeople" type="text" value="120/96" /></label>
      <label>有效渠道 目标/达成<input id="channelCount" type="text" value="6/5" /></label>
      <label>泰有鑫意月目标<input id="specialTarget" type="number" value="10" /></label>
      <label>泰有鑫意本月业绩P<input id="specialMonth" type="number" value="0" /></label>
      <label>泰有鑫意今日业绩P<input id="specialToday" type="number" value="0" /></label>
      <label>本月累计线上品宣篇数<input id="onlineMonth" type="number" value="0" /></label>
      <label>本月累计线下培训场数<input id="offlineTrainingMonth" type="number" value="11" /></label>
      <label>本月累计线下活动场数<input id="offlineActivityMonth" type="number" value="1" /></label>
      <label>本月累计活粉人数<input id="monthActiveFans" type="number" value="0" /></label>
      <label>本月累计高P粉人数<input id="monthHighPFans" type="number" value="0" /></label>
    </div>
  </details>

  <section class="person-section">
    <div class="person-section-header">
      <h2>四人填写区</h2>
      <button id="collapseAll" type="button" class="secondary small">全部折叠</button>
    </div>
    <div class="person-grid" id="personGrid"></div>
  </section>

  <section class="result-section">
    <div class="result-header">
      <h2>生成结果</h2>
      <div class="actions">
        <button id="copyBtn" type="button" class="secondary">复制全文</button>
        <button id="downloadBtn" type="button" class="secondary">下载文本</button>
      </div>
    </div>
    <textarea id="result" spellcheck="false" placeholder="点击「生成汇报」后结果出现在这里"></textarea>
  </section>

</main>
<script>
﻿// ── helpers ──────────────────────────────────────────────
const $ = (s, p) => (p || document).querySelector(s);
const $$ = (s, p) => Array.from((p || document).querySelectorAll(s));
const E = (tag, attrs = {}, children = []) => {
  const el = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs))
    if (k === "className") el.className = v;
    else if (k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(), v);
    else el.setAttribute(k, v);
  for (const c of children) el.append(typeof c === "string" ? document.createTextNode(c) : c);
  return el;
};

// ── form field definitions per person ────────────────────
const PERSON_FIELDS = [
  { id: "work",         label: "今日工作内容（每行一条）",   type: "textarea",  span: "full-span" },
  { id: "channelWork",  label: "渠道经营",   type: "text" },
  { id: "activity",     label: "活动赋能",   type: "text" },
  { id: "training",     label: "培训辅导",   type: "text" },
  { id: "fansInterview", label: "有效面谈人数",    type: "number" },
  { id: "fansPlan",     label: "计划书递送份数",  type: "number" },
  { id: "fansNew",      label: "新增粉丝人数",    type: "number" },
  { id: "fansActive",   label: "新增活粉人数",    type: "number" },
  { id: "fansHighP",    label: "新增高P粉人数",   type: "number" },
  { id: "specialOnline",  label: "泰有鑫意今日线上品宣篇数", type: "number" },
  { id: "specialTrain",   label: "泰有鑫意今日线下培训场数", type: "number" },
  { id: "specialAct",     label: "泰有鑫意今日线下活动场数", type: "number" },
  { id: "excellent",    label: "表现亮点（内容即可，自动配人名）", type: "text", span: "full-span" },
  { id: "improve",      label: "需改进事项（内容即可，自动配人名）", type: "text", span: "full-span" },
  { id: "plan",         label: "明日工作计划（每行一条）", type: "textarea", span: "full-span" },
  { id: "premium",      label: "明日保费预估（每行一条）", type: "textarea", span: "full-span" },
];

const DEFAULT_NAMES = ["伙伴1","伙伴2","伙伴3","伙伴4"];
const personData = DEFAULT_NAMES.map(() => ({}));

// ── localStorage helpers ────────────────────────────────
const STORAGE_KEY = 'dailyReportData_v1';
function saveToStorage() {
  const data = {
    summary: {
      reportDate: $('#reportDate').value,
      monthLabel: $('#monthLabel').value,
      todayPresale: $('#todayPresale').value,
      todayUnderwrite: $('#todayUnderwrite').value,
      monthPresale: $('#monthPresale').value,
      monthUnderwrite: $('#monthUnderwrite').value,
      monthTarget: $('#monthTarget').value,
      tomorrowEstimate: $('#tomorrowEstimate').value,
      activityPeople: $('#activityPeople').value,
      channelCount: $('#channelCount').value,
      specialTarget: $('#specialTarget').value,
      specialMonth: $('#specialMonth').value,
      specialToday: $('#specialToday').value,
      onlineMonth: $('#onlineMonth').value,
      offlineTrainingMonth: $('#offlineTrainingMonth').value,
      offlineActivityMonth: $('#offlineActivityMonth').value,
      monthActiveFans: $('#monthActiveFans').value,
      monthHighPFans: $('#monthHighPFans').value,
    },
    people: personData.map((p, i) => {
      const result = { name: p.name };
      for (const f of PERSON_FIELDS) {
        result[f.id] = p[f.id];
      }
      return result;
    }),
    result: $('#result').value,
    savedAt: new Date().toISOString()
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  // Show save indicator
  const ind = document.getElementById('saveIndicator');
  if (ind) {
    ind.style.display = 'inline';
    clearTimeout(ind._timer);
    ind._timer = setTimeout(() => { ind.style.display = 'none'; }, 1500);
  }
}
function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    // Load summary
    if (data.summary) {
      Object.entries(data.summary).forEach(([k, v]) => {
        const el = document.getElementById(k);
        if (el) el.value = v || '';
      });
    }
    // Load people
    if (data.people && data.people.length === 4) {
      data.people.forEach((p, i) => {
        personData[i].name = p.name || DEFAULT_NAMES[i];
        for (const f of PERSON_FIELDS) {
          personData[i][f.id] = p[f.id] || '';
        }
      });
    }
    // Load result
    if (data.result) {
      $('#result').value = data.result;
    }
    return true;
  } catch (e) {
    console.error('Load failed:', e);
    return false;
  }
}
function clearStorage() {
  localStorage.removeItem(STORAGE_KEY);
  const ind = document.getElementById('saveIndicator');
  if (ind) ind.style.display = 'none';
}

// ── build person cards ──────────────────────────────────
function buildCards() {
  const grid = document.getElementById("personGrid");
  grid.innerHTML = "";
  for (let i = 0; i < 4; i++) {
    const card = E("div", { className: "person-card", "data-idx": i });

    const header = E("div", { className: "person-card-header" });
    const nameInput = E("input", {
      type: "text", className: "name-input", value: DEFAULT_NAMES[i],
      onInput: (e) => { personData[i].name = e.target.value; saveToStorage(); },
    });
    personData[i].name = DEFAULT_NAMES[i];
    const toggleBtn = E("button", {
      type: "button", className: "toggle-btn", textContent: "收起",
      onClick: () => {
        const body = card.querySelector(".person-body");
        const hidden = body.style.display === "none";
        body.style.display = hidden ? "" : "none";
        toggleBtn.textContent = hidden ? "收起" : "展开";
      },
    });
    header.append(nameInput, toggleBtn);

    const body = E("div", { className: "person-body" });
    for (const f of PERSON_FIELDS) {
      const label = E("label", f.span ? { className: "full-span" } : {});
      const id = `p${i}_${f.id}`;
      let input;
      if (f.type === "textarea") {
        input = E("textarea", { id, placeholder: f.label.replace(/（.*）/, "") });
      } else {
        input = E("input", { type: f.type, id, step: f.type === "number" ? "1" : undefined, value: "" });
      }
      personData[i][f.id] = "";
      input.addEventListener("input", (e) => {
        personData[i][f.id] = e.target.value;
        saveToStorage();
      });
      label.append(f.label, input);
      body.append(label);
    }

    card.append(header, body);
    grid.append(card);
  }
}

// ── attach auto-save to summary fields ─────────────────
function attachSummaryAutoSave() {
  const summaryIds = ['reportDate','monthLabel','todayPresale','todayUnderwrite','monthPresale','monthUnderwrite','monthTarget','tomorrowEstimate','activityPeople','channelCount','specialTarget','specialMonth','specialToday','onlineMonth','offlineTrainingMonth','offlineActivityMonth','monthActiveFans','monthHighPFans'];
  summaryIds.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('input', saveToStorage);
  });
}

// ── collect data ────────────────────────────────────────
function getSummary() {
  const [actTarget, actDone] = splitPair($("#activityPeople").value);
  const [chTarget, chDone] = splitPair($("#channelCount").value);
  return {
    date: $("#reportDate").value.trim(),
    monthLabel: $("#monthLabel").value.trim() || "本月",
    todayPresale: n($("#todayPresale").value),
    todayUnderwrite: n($("#todayUnderwrite").value),
    monthPresale: n($("#monthPresale").value),
    monthUnderwrite: n($("#monthUnderwrite").value),
    monthTarget: n($("#monthTarget").value),
    tomorrowEstimate: n($("#tomorrowEstimate").value),
    activityTarget: actTarget,
    activityDone: actDone,
    channelTarget: chTarget,
    channelDone: chDone,
    specialTarget: n($("#specialTarget").value),
    specialMonth: n($("#specialMonth").value),
    specialToday: n($("#specialToday").value),
    onlineMonth: n($("#onlineMonth").value),
    offlineTrainingMonth: n($("#offlineTrainingMonth").value),
    offlineActivityMonth: n($("#offlineActivityMonth").value),
    monthActiveFans: n($("#monthActiveFans").value),
    monthHighPFans: n($("#monthHighPFans").value),
  };
}

function getPeople() {
  return personData.map((p, i) => ({
    name: p.name || `伙伴${i+1}`,
    work: lines(p.work),
    channelWork: p.channelWork || "",
    activity: p.activity || "",
    training: p.training || "",
    fansInterview: n(p.fansInterview),
    fansPlan: n(p.fansPlan),
    fansNew: n(p.fansNew),
    fansActive: n(p.fansActive),
    fansHighP: n(p.fansHighP),
    specialOnline: n(p.specialOnline),
    specialTrain: n(p.specialTrain),
    specialAct: n(p.specialAct),
    excellent: p.excellent || "",
    improve: p.improve || "",
    plan: lines(p.plan),
    premium: lines(p.premium),
  }));
}

// ── merge ────────────────────────────────────────────────
function merge(people) {
  const m = {
    work: [], plan: [], premium: [],
    excellent: [], improve: [],
    fans: { interview:0, plan:0, newFans:0, activeFans:0, highP:0 },
    special: { onlineToday:0, trainToday:0, actToday:0 },
    channelWork: [], activity: [], training: [],
  };
  for (const p of people) {
    // work/plan/premium: no names in output
    for (const item of p.work) m.work.push(item);
    for (const item of p.plan) m.plan.push(item);
    for (const item of p.premium) m.premium.push(item);

    // excellent/improve: keep names for 点评 section
    if (p.excellent) m.excellent.push({ name: p.name, text: p.excellent });
    if (p.improve) m.improve.push({ name: p.name, text: p.improve });

    // fan numbers
    m.fans.interview += p.fansInterview;
    m.fans.plan += p.fansPlan;
    m.fans.newFans += p.fansNew;
    m.fans.activeFans += p.fansActive;
    m.fans.highP += p.fansHighP;

    // special numbers
    m.special.onlineToday += p.specialOnline;
    m.special.trainToday += p.specialTrain;
    m.special.actToday += p.specialAct;

    // channel/activity/training: no names
    if (p.channelWork) m.channelWork.push(p.channelWork);
    if (p.activity) m.activity.push(p.activity);
    if (p.training) m.training.push(p.training);
  }
  return m;
}

// ── render report ───────────────────────────────────────
function render(s, people, m) {
  const dateCode = s.date.replace(/\./g,"");
  const ml = s.monthLabel;
  const completion = s.monthTarget ? `${Math.round(s.monthUnderwrite/s.monthTarget*100)}%` : "0%";
  const specialGap = s.specialMonth - s.specialTarget;

  const workItems = unique(m.work);
  const planItems = unique(m.plan);
  const premiumItems = unique(m.premium);

  // excellent: format as "名字；亮点内容"
  const excellentNames = m.excellent.map(e => e.name).filter(onlyUnique).join("、");
  const excellentTexts = m.excellent.map(e => e.text).filter(onlyUnique).join("；");
  const excellent = m.excellent.length
    ? `${excellentNames}；${excellentTexts}`
    : `${people.map(p=>p.name).join("、")}；工作推进正常`;

  const improveNames = m.improve.map(e => e.name).filter(onlyUnique).join("、");
  const improveTexts = m.improve.map(e => e.text).filter(onlyUnique).join("；");
  const improve = m.improve.length ? `${improveNames}；${improveTexts}` : "无";

  const channel = unique(m.channelWork).join("、") || "无";
  const activity = unique(m.activity).join("、") || "无";
  const training = unique(m.training).join("、") || "无";
  const workContent = workItems.length ? numberLines(workItems) : ["无"];
  const planContent = planItems.length ? numberLines(planItems) : ["无"];
  const premiumContent = premiumItems.length ? premiumItems : ["暂无"];

  return [
    "一、",
    "",
    `【${dateCode}多元汇报】`,
    "",
    "一、目标进度",
    `今日预收${fmt(s.todayPresale)}万p，今日承保${fmt(s.todayUnderwrite)}万p；${ml}累计预收${fmt(s.monthPresale)}万p，承保${fmt(s.monthUnderwrite)}万p；`,
    `${ml}活动人力目标${fmt(s.activityTarget)}人，达成${fmt(s.activityDone)}人；有效渠道目标${fmt(s.channelTarget)}个，达成${fmt(s.channelDone)}个。`,
    `${ml}目标${fmt(s.monthTarget)}万，任务达成${completion}`,
    "",
    "二、今日工作总结：",
    ...workContent,
    "",
    "三、明日工作计划：",
    ...planContent,
    "",
    "三、明日保费预估：",
    ...premiumContent,
    "",
    "",
    "二、",
    "",
    `四川分多元日报${dateCode}`,
    "",
    "一、【泰有鑫意品宣推动及业绩情况】",
    "（一）品宣",
    "1.泰有鑫意今日品宣：",
    `线上${fmt(m.special.onlineToday)}篇，`,
    `线下培训${fmt(m.special.trainToday)}场，线下活动${fmt(m.special.actToday)}场`,
    "2.泰有鑫意本月累计品宣：",

// ── generator ───────────────────────────────────────────
function generate() {
  const s = getSummary();
  const people = getPeople().filter(p => p.work.length || p.plan.length || p.premium.length || p.excellent || p.improve);
  const m = merge(people);
  $("#result").value = render(s, people, m);
}

// ── copy / download ─────────────────────────────────────
async function copyResult() {
  const text = $("#result").value;
  if (!text.trim()) return;
  await navigator.clipboard.writeText(text);
  const b = $("#copyBtn");
  const prev = b.textContent;
  b.textContent = "✓ 已复制";
  setTimeout(() => b.textContent = prev, 1200);
}

function downloadResult() {
  const text = $("#result").value;
  if (!text.trim()) return;
  const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = E("a", { href: url, download: `每日汇报_${new Date().toISOString().slice(0,10)}.txt` });
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

const SAMPLES = [
  { name:"李红霞", work:["明亚渠道驻点沟通","泰有鑫意一对一宣导，跟进高P线索2个"], channelWork:"明亚、保通驻点", fansInterview:12, fansPlan:2, fansNew:3, excellent:"泰有鑫意有线索", plan:["明亚驻点","线索落地追踪"], premium:["明亚:泰给利5万趸"] },

  { name:"朱中国", work:["年丰、泛华驻点","客户沙龙邀约"], channelWork:"年丰、泛华", fansInterview:25, fansPlan:3, fansNew:3, fansActive:1, improve:"泰有鑫意推动节奏需加快", plan:["恒邦630冲刺培训","宝瑞泰有鑫意线上培训","年丰吴婷瑶团队产品培训"] },
];

function fillSample() {
  for (let i = 0; i < 4; i++) {
    const s = SAMPLES[i];
    const card = document.querySelectorAll(".person-card")[i];
    if (!card) continue;
    card.querySelector(".name-input").value = s.name;
    personData[i].name = s.name;
    for (const f of PERSON_FIELDS) {
      const el = card.querySelector(`#p${i}_${f.id}`);
      if (!el) continue;
      let val = "";
      if (f.id === "work") val = (s.work||[]).join("\n");
      else if (f.id === "plan") val = (s.plan||[]).join("\n");
      else if (f.id === "premium") val = (s.premium||[]).join("\n");
      else if (f.id === "channelWork") val = s.channelWork || "";
      else if (f.id === "activity") val = s.activity || "";
      else if (f.id === "training") val = s.training || "";
      else if (f.id === "excellent") val = s.excellent || "";
      else if (f.id === "improve") val = s.improve || "";
      else if (["fansInterview","fansPlan","fansNew","fansActive","fansHighP","specialOnline","specialTrain","specialAct"].includes(f.id)) val = s[f.id] || 0;
      el.value = val;
      personData[i][f.id] = typeof val === "string" ? val : String(val);
    }
    card.querySelector(".person-body").style.display = "";
    card.querySelector(".toggle-btn").textContent = "收起";
  }
  generate();
}

// ── clear ───────────────────────────────────────────────
function clearAll() {
  // Clear localStorage
  clearStorage();
  // Clear summary fields
  const summaryIds = ['reportDate','monthLabel','todayPresale','todayUnderwrite','monthPresale','monthUnderwrite','monthTarget','tomorrowEstimate','activityPeople','channelCount','specialTarget','specialMonth','specialToday','onlineMonth','offlineTrainingMonth','offlineActivityMonth','monthActiveFans','monthHighPFans'];
  summaryIds.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  // Clear person cards
  for (let i = 0; i < 4; i++) {
    const card = document.querySelectorAll(".person-card")[i];
    if (!card) continue;
    card.querySelector(".name-input").value = DEFAULT_NAMES[i];
    personData[i].name = DEFAULT_NAMES[i];
    for (const f of PERSON_FIELDS) {
      const el = card.querySelector(`#p${i}_${f.id}`);
      if (!el) continue;
      el.value = "";
      personData[i][f.id] = "";
    }
  }
  $("#result").value = "";
  // Save cleared state
  saveToStorage();
}

// ── utilities ───────────────────────────────────────────
function n(v) { return Number(v || 0); }
function lines(v) { return String(v||"").split("\n").map(s=>s.trim()).filter(Boolean); }
function fmt(v) { const x = n(v); return Number.isInteger(x) ? String(x) : String(x); }
function onlyUnique(v, i, a) { return a.indexOf(v) === i; }
function splitPair(v) {
  const nums = String(v).match(/\d+(?:\.\d+)?/g) || [];
  return [n(nums[0]), n(nums[1])];
}
function numberLines(items) {
  return items.length ? items.map((item, i) => `${i+1}、${item}`) : ["无"];
}
function makeItem(items, keywords) {
  const matched = items.filter(it => keywords.some(k => it.includes(k)));
  return matched.length ? matched.join("、") : "无";
}
function unique(items) {
  return [...new Set(items.map(it => it.trim()).filter(Boolean))];
}

// ── collapse all ────────────────────────────────────────
function collapseAll() {
  $$(".person-card").forEach(card => {
    const body = card.querySelector(".person-body");
    const btn = card.querySelector(".toggle-btn");
    if (body.style.display !== "none") {
      body.style.display = "none";
      btn.textContent = "展开";
    }
  });
}

// ── init ────────────────────────────────────────────────
function init() {
  buildCards();
  // Try to load saved data
  const hasData = loadFromStorage();
  // If loaded data, populate the form fields
  if (hasData) {
    for (let i = 0; i < 4; i++) {
      const card = document.querySelectorAll(".person-card")[i];
      if (!card) continue;
      card.querySelector(".name-input").value = personData[i].name || DEFAULT_NAMES[i];
      for (const f of PERSON_FIELDS) {
        const el = card.querySelector(`#p${i}_${f.id}`);
        if (el) el.value = personData[i][f.id] || '';
      }
    }
  }
  attachSummaryAutoSave();
  $("#generateBtn").addEventListener("click", () => { generate(); saveToStorage(); });
  $("#copyBtn").addEventListener("click", copyResult);
  $("#downloadBtn").addEventListener("click", downloadResult);
  $("#sampleBtn").addEventListener("click", () => { fillSample(); saveToStorage(); });
  $("#clearBtn").addEventListener("click", clearAll);
  $("#collapseAll").addEventListener("click", collapseAll);
}
document.addEventListener("DOMContentLoaded", init);
